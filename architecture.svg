<svg width="720" height="540" viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>QuizBlitz server architecture</title>
  <desc>A Java WebSocket server containing a game loop thread, a synchronized scoreboard shared across all connections, and browser clients connecting via WebSocket.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Server container -->
  <rect x="200" y="30" width="500" height="480" rx="20" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text x="218" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#444441">Server process (Java)</text>

  <!-- Clients -->
  <rect x="20" y="120" width="145" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="92" y="148" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#712B13">📱 Player 1</text>

  <rect x="20" y="200" width="145" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="92" y="228" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#712B13">📱 Player 2</text>

  <rect x="20" y="280" width="145" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="92" y="308" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#712B13">📱 Player 3</text>

  <rect x="20" y="360" width="145" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="92" y="388" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#712B13">📱 Player N</text>

  <!-- Connection label -->
  <text x="110" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888780">WebSocket (JSON)</text>

  <!-- GameServer box -->
  <rect x="230" y="85" width="440" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="450" y="112" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#085041">GameServer.java</text>
  <text x="450" y="134" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0F6E56">onOpen · onMessage · onClose</text>

  <!-- Handler labels inside GameServer -->
  <rect x="248" y="180" width="128" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="312" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#085041">conn → Player 1</text>
  <text x="312" y="218" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0F6E56">managed by library</text>

  <rect x="392" y="180" width="128" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="456" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#085041">conn → Player 2</text>
  <text x="456" y="218" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0F6E56">managed by library</text>

  <rect x="536" y="180" width="128" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="600" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#085041">conn → Player N</text>
  <text x="600" y="218" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0F6E56">managed by library</text>

  <!-- Arrows: clients to server -->
  <line x1="165" y1="147" x2="228" y2="115" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="165" y1="227" x2="228" y2="127" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="165" y1="307" x2="228" y2="137" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="165" y1="387" x2="228" y2="147" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrows: GameServer to handlers -->
  <line x1="312" y1="155" x2="312" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="456" y1="155" x2="456" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="600" y1="155" x2="600" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Scoreboard -->
  <rect x="230" y="270" width="440" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="450" y="298" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#633806">Scoreboard.java</text>
  <text x="450" y="320" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#854F0B">synchronized methods — shared by all threads</text>
  <text x="450" y="338" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854F0B">addPlayer · addPoints · snapshot · winner</text>

  <!-- Arrows: handlers to scoreboard -->
  <line x1="312" y1="230" x2="312" y2="268" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="456" y1="230" x2="456" y2="268" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="600" y1="230" x2="600" y2="268" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Race condition callout -->
  <rect x="248" y="248" width="100" height="18" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="298" y="259" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#791F1F">⚡ race condition</text>

  <!-- GameLoop -->
  <rect x="230" y="390" width="440" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="450" y="416" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#3C3489">GameLoop.java — dedicated thread</text>
  <text x="450" y="438" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#534AB7">implements Runnable · 20s timer per round</text>

  <!-- Arrows: scoreboard ↔ game loop (bidirectional) -->
  <line x1="420" y1="350" x2="420" y2="388" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="388" x2="480" y2="350" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text x="406" y="374" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888780">reads scores</text>
  <text x="494" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888780">game state</text>

  <!-- QuestionBank -->
  <rect x="230" y="475" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="330" y="498" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#444441">QuestionBank + Question</text>

  <!-- Arrow: QuestionBank to GameLoop -->
  <line x1="330" y1="475" x2="330" y2="462" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="490" y="478" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="510" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5F5E5A">Sockets / I/O</text>
  <rect x="490" y="498" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="510" y="509" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5F5E5A">Threading</text>
  <rect x="590" y="478" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="610" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5F5E5A">Synchronization</text>
  <rect x="590" y="498" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="610" y="509" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5F5E5A">Clients</text>
</svg>